<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SFRO Swish QR-generator</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #222;
      background: #f5f5f5;
    }

    body {
      margin: 0;
      padding: 24px;
    }

    .card {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 1.45rem;
    }

    label {
      display: block;
      font-weight: 650;
      margin-top: 16px;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      font-size: 1rem;
      border: 1px solid #bbb;
      border-radius: 8px;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 13px;
      font-size: 1rem;
      font-weight: 700;
      border: 0;
      border-radius: 8px;
      background: #111;
      color: #fff;
      cursor: pointer;
    }

    button.secondary {
      background: #555;
      margin-top: 10px;
    }

    .result {
      margin-top: 22px;
      text-align: center;
    }

    .result img {
      width: 280px;
      max-width: 100%;
      height: auto;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px;
      background: #fff;
    }

    .check {
      text-align: left;
      margin-top: 16px;
      padding: 12px;
      background: #f0f0f0;
      border-radius: 8px;
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .error {
      margin-top: 16px;
      padding: 12px;
      color: #8a0000;
      background: #ffecec;
      border: 1px solid #f2b8b8;
      border-radius: 8px;
    }

    .hint {
      color: #666;
      font-size: 0.9rem;
      line-height: 1.35;
    }

    .payload {
      word-break: break-all;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 0.8rem;
      margin-top: 10px;
      color: #555;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>SFRO Swish QR-generator</h1>

    <p class="hint">
      Fyll i blankett-/ärendenummer och belopp. QR-koden öppnar Swish med mottagare,
      belopp och meddelande förifyllt.
    </p>

    <label for="message">Blankettnummer / meddelande</label>
    <input id="message" type="text" placeholder="Exempel: SFRO 12345" autocomplete="off">

    <label for="amount">Belopp, SEK</label>
    <input id="amount" type="text" inputmode="decimal" placeholder="Exempel: 500 eller 500,00">

    <button id="generateBtn" type="button">Generera Swish-QR</button>
    <button id="clearBtn" class="secondary" type="button">Rensa</button>

    <div id="output" class="result"></div>
  </main>

  <script>
    /*
      ÄNDRA DETTA:
      Skriv in rätt Swishnummer. Endast siffror, inget +46, inga mellanslag.
      Exempel privatnummer: 46701234567
      Exempel företagsnummer: 1231231234
    */
    const SWISH_NUMBER = "1232139483";

    /*
      Lock mask:
      0 = inget låst
      1 = mottagare låst
      2 = belopp låst
      3 = belopp och meddelande låst enligt praktisk användning i många implementationer
      För SFRO är 3 normalt rimligt så att användaren inte råkar ändra belopp/meddelande.
    */
    const LOCK_MASK = "3";

    const messageEl = document.getElementById("message");
    const amountEl = document.getElementById("amount");
    const outputEl = document.getElementById("output");

    document.getElementById("generateBtn").addEventListener("click", generateQr);
    document.getElementById("clearBtn").addEventListener("click", clearForm);

    amountEl.addEventListener("keydown", function (event) {
      if (event.key === "Enter") generateQr();
    });

    messageEl.addEventListener("keydown", function (event) {
      if (event.key === "Enter") generateQr();
    });

    function normalizeAmount(raw) {
      let value = String(raw || "")
        .trim()
        .replace(/\s/g, "")
        .replace(".", ",");

      if (!value) {
        throw new Error("Ange belopp.");
      }

      if (!/^\d+(,\d{1,2})?$/.test(value)) {
        throw new Error("Ange belopp som till exempel 500 eller 500,00.");
      }

      if (!value.includes(",")) {
        value += ",00";
      } else if (/,\d$/.test(value)) {
        value += "0";
      }

      const numeric = Number(value.replace(",", "."));
      if (!Number.isFinite(numeric) || numeric <= 0) {
        throw new Error("Beloppet måste vara större än 0 kr.");
      }

      return value;
    }

    function validateSwishNumber(number) {
      if (!/^\d+$/.test(number)) {
        throw new Error("Swishnumret måste bara innehålla siffror. Ändra SWISH_NUMBER i HTML-filen.");
      }

      if (number === "123XXXXXXX") {
        throw new Error("Du måste först ändra SWISH_NUMBER i HTML-filen till rätt Swishnummer.");
      }
    }

    function generateQr() {
      outputEl.innerHTML = "";

      try {
        validateSwishNumber(SWISH_NUMBER);

        const message = messageEl.value.trim();
        const amount = normalizeAmount(amountEl.value);

        if (!message) {
          throw new Error("Ange blankettnummer eller meddelande.");
        }

        if (message.length > 50) {
          throw new Error("Meddelandet är långt. Kortare meddelande rekommenderas för Swish.");
        }

        /*
          Swish QR C2B-format:
          C<swishnummer>;<belopp>;<meddelande>;<lock_mask>

          Meddelandet URL-kodas i payloaden så att å, ä, ö, mellanslag och specialtecken fungerar.
        */
        const payload =
          "C" +
          SWISH_NUMBER +
          ";" +
          amount +
          ";" +
          encodeURIComponent(message) +
          ";" +
          LOCK_MASK;

        /*
          QR-bilden genereras via en bild-URL.
          Fördelen är att sidan slipper ladda ett separat JavaScript-bibliotek.
        */
        const qrUrl =
          "https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=12&data=" +
          encodeURIComponent(payload);

        const img = document.createElement("img");
        img.src = qrUrl;
        img.alt = "Swish QR-kod";

        const check = document.createElement("div");
        check.className = "check";
        check.innerHTML =
          "<strong>Kontrollera innan betalning:</strong><br>" +
          "Swishnummer: " + escapeHtml(SWISH_NUMBER) + "<br>" +
          "Belopp: " + escapeHtml(amount) + " kr<br>" +
          "Meddelande: " + escapeHtml(message) +
          "<div class='payload'>Payload: " + escapeHtml(payload) + "</div>";

        outputEl.appendChild(img);
        outputEl.appendChild(check);
      } catch (error) {
        showError(error.message);
      }
    }

    function clearForm() {
      messageEl.value = "";
      amountEl.value = "";
      outputEl.innerHTML = "";
      messageEl.focus();
    }

    function showError(text) {
      outputEl.innerHTML = "<div class='error'>" + escapeHtml(text) + "</div>";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
